name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger deploy on mini PC
        run: |
          curl -sf -X POST https://google.remenby.fr/deploy \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json"
