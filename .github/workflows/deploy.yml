name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Trigger deploy on mini PC
        run: |
          curl -sf -X POST https://google.remenby.fr/deploy \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json"
